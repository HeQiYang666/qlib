# Scenario C20: ALPHA20 features + custom preprocessing (RobustZScoreNorm + Fillna)
# Same 20 features as RD-Agent, with additional preprocessing to test if preprocessing helps
qlib_init:
    provider_uri: "~/.qlib/qlib_data/cn_data"
    region: cn
market: &market all
benchmark: &benchmark sh000852
data_handler_config: &data_handler_config
    start_time: 2019-01-01
    end_time: 2026-06-01
    instruments: *market
    data_loader:
        class: NestedDataLoader
        kwargs:
            dataloader_l:
                - class: qlib.contrib.data.loader.Alpha158DL
                  kwargs:
                    config:
                        label:
                            - ["Ref($close, -2)/Ref($close, -1) - 1"]
                            - ["LABEL0"]
                        feature:
                            - ['Corr($close/Ref($close,1), Log($volume/Ref($volume, 1)+1), 10)',
                               'Corr($close/Ref($close,1), Log($volume/Ref($volume, 1)+1), 5)',
                               'Corr($close/Ref($close,1), Log($volume/Ref($volume, 1)+1), 60)',
                               'Corr($close, Log($volume+1), 10)',
                               'Corr($close, Log($volume+1), 20)',
                               'Corr($close, Log($volume+1), 5)',
                               'Corr($close, Log($volume+1), 60)',
                               '($high-$low)/$open',
                               '(Less($open, $close)-$low)/$open',
                               'Resi($close, 10)/$close',
                               'Resi($close, 5)/$close',
                               'Ref($close, 60)/$close',
                               'Rsquare($close, 10)',
                               'Rsquare($close, 20)',
                               'Rsquare($close, 5)',
                               'Rsquare($close, 60)',
                               'Std($close, 5)/$close',
                               'Std($volume, 5)/($volume+1e-12)',
                               'Std(Abs($close/Ref($close, 1)-1)*$volume, 5)/(Mean(Abs($close/Ref($close, 1)-1)*$volume, 5)+1e-12)',
                               'Std(Abs($close/Ref($close, 1)-1)*$volume, 60)/(Mean(Abs($close/Ref($close, 1)-1)*$volume, 60)+1e-12)']
                            - ['CORD10', 'CORD5', 'CORD60', 'CORR10', 'CORR20', 'CORR5', 'CORR60',
                               'KLEN', 'KLOW', 'RESI10', 'RESI5', 'ROC60',
                               'RSQR10', 'RSQR20', 'RSQR5', 'RSQR60',
                               'STD5', 'VSTD5', 'WVMA5', 'WVMA60']
    infer_processors:
        - class: RobustZScoreNorm
          kwargs:
              fields_group: feature
              clip_outlier: true
              fit_start_time: 2019-01-01
              fit_end_time: 2022-12-31
        - class: Fillna
          kwargs:
              fields_group: feature
    learn_processors:
        - class: DropnaLabel
        - class: CSZScoreNorm
          kwargs:
              fields_group: label
port_analysis_config: &port_analysis_config
    executor:
        class: SimulatorExecutor
        module_path: qlib.backtest.executor
        kwargs:
            time_per_step: day
            settle_type: cash
            generate_portfolio_metrics: true
    strategy:
        class: TopkDropoutStrategy
        module_path: qlib.contrib.strategy
        kwargs:
            signal: <PRED>
            topk: 150
            n_drop: 30
            only_tradable: True
    backtest:
        start_time: 2024-07-01
        end_time: 2026-06-01
        account: 100000000
        benchmark: *benchmark
        exchange_kwargs:
            limit_threshold: ["$limit_buy", "$limit_sell"]
            codes: *market
            deal_price: close
            open_cost: 0.0005
            close_cost: 0.0015
            min_cost: 5
task:
    model:
        class: LGBModel
        module_path: qlib.contrib.model.gbdt
        kwargs:
            loss: mse
            colsample_bytree: 0.8879
            learning_rate: 0.2
            subsample: 0.8789
            lambda_l1: 205.6999
            lambda_l2: 580.9768
            max_depth: 8
            num_leaves: 210
            num_threads: 20
            seed: 42
    dataset:
        class: DatasetH
        module_path: qlib.data.dataset
        kwargs:
            handler:
                class: DataHandlerLP
                module_path: qlib.contrib.data.handler
                kwargs: *data_handler_config
            segments:
                train: [2019-01-01, 2022-12-31]
                valid: [2023-01-01, 2024-06-30]
                test: [2024-07-01, 2026-06-01]
    record:
        - class: SignalRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            model: <MODEL>
            dataset: <DATASET>
        - class: SigAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            ana_long_short: False
            ann_scaler: 252
        - class: PortAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            config: *port_analysis_config
